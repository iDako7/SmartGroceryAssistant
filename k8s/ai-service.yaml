apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-service
  namespace: sga
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-service
  template:
    metadata:
      labels:
        app: ai-service
    spec:
      containers:
        - name: ai-service
          image: sga/ai-service
          imagePullPolicy: Never
          ports:
            - containerPort: 4003
          env:
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: sga-secret
                  key: jwt-secret
            - name: REDIS_HOST
              value: redis
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: sga-secret
                  key: redis-password
            - name: RABBITMQ_URL
              value: amqp://sga:$(RABBITMQ_PASSWORD)@rabbitmq:5672/
            - name: RABBITMQ_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: sga-secret
                  key: rabbitmq-password
            - name: OPENROUTER_API_KEY
              valueFrom:
                secretKeyRef:
                  name: sga-secret
                  key: openrouter-api-key
            - name: OPENROUTER_MODEL
              valueFrom:
                secretKeyRef:
                  name: sga-secret
                  key: openrouter-model
            - name: AI_SERVICE_PORT
              value: "4003"
          readinessProbe:
            httpGet:
              path: /health
              port: 4003
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: ai-service
  namespace: sga
spec:
  selector:
    app: ai-service
  ports:
    - port: 4003
      targetPort: 4003
