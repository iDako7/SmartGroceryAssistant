apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: sga
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
        - name: api-gateway
          image: sga/api-gateway
          imagePullPolicy: Never
          ports:
            - containerPort: 3001
          env:
            - name: API_GATEWAY_PORT
              value: "3001"
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: sga-secret
                  key: jwt-secret
            - name: CORS_ORIGIN
              value: http://localhost:3000
            - name: USER_SERVICE_URL
              value: http://user-service:4001
            - name: LIST_SERVICE_URL
              value: http://list-service:4002
            - name: AI_SERVICE_URL
              value: http://ai-service:4003
          readinessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: sga
spec:
  selector:
    app: api-gateway
  ports:
    - port: 3001
      targetPort: 3001
