apiVersion: apps/v1
kind: Deployment
metadata:
  name: list-service
  namespace: sga
spec:
  replicas: 1
  selector:
    matchLabels:
      app: list-service
  template:
    metadata:
      labels:
        app: list-service
    spec:
      containers:
        - name: list-service
          image: sga/list-service
          imagePullPolicy: Never
          ports:
            - containerPort: 4002
          env:
            - name: LIST_DB_URL
              value: postgres://sga:$(POSTGRES_PASSWORD)@postgres:5432/list_db?sslmode=disable
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: sga-secret
                  key: postgres-password
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: sga-secret
                  key: jwt-secret
            - name: RABBITMQ_URL
              value: amqp://sga:$(RABBITMQ_PASSWORD)@rabbitmq:5672/
            - name: RABBITMQ_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: sga-secret
                  key: rabbitmq-password
            - name: LIST_SERVICE_PORT
              value: "4002"
          readinessProbe:
            httpGet:
              path: /health
              port: 4002
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: list-service
  namespace: sga
spec:
  selector:
    app: list-service
  ports:
    - port: 4002
      targetPort: 4002
