# Replace values before running in any shared environment.
# For local dev the defaults here match docker-compose.
apiVersion: v1
kind: Secret
metadata:
  name: sga-secret
  namespace: sga
stringData:
  postgres-password: sga_secret
  redis-password: redis_secret
  rabbitmq-password: sga_secret
  jwt-secret: change_me_in_production
  openrouter-api-key: ""          # paste your key here
  openrouter-model: anthropic/claude-3.5-haiku
