apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-init
  namespace: sga
data:
  init.sql: |
    CREATE DATABASE user_db;
    \c user_db;
    CREATE EXTENSION IF NOT EXISTS "pgcrypto";
    CREATE TABLE users (
      id            UUID PRIMARY KEY DEFAULT gen_random_uuid(),
      email         VARCHAR(255) UNIQUE NOT NULL,
      password_hash VARCHAR(255) NOT NULL,
      created_at    TIMESTAMPTZ NOT NULL DEFAULT NOW(),
      updated_at    TIMESTAMPTZ NOT NULL DEFAULT NOW()
    );
    CREATE TABLE profiles (
      id                   UUID PRIMARY KEY DEFAULT gen_random_uuid(),
      user_id              UUID UNIQUE NOT NULL REFERENCES users(id) ON DELETE CASCADE,
      language_preference  VARCHAR(20) NOT NULL DEFAULT 'en',
      dietary_restrictions TEXT[]      NOT NULL DEFAULT '{}',
      household_size       SMALLINT    NOT NULL DEFAULT 1,
      taste_preferences    TEXT        NOT NULL DEFAULT '',
      created_at           TIMESTAMPTZ NOT NULL DEFAULT NOW(),
      updated_at           TIMESTAMPTZ NOT NULL DEFAULT NOW()
    );
    CREATE INDEX idx_profiles_user_id ON profiles(user_id);

    CREATE DATABASE list_db;
    \c list_db;
    CREATE TABLE sections (
      id         UUID PRIMARY KEY DEFAULT gen_random_uuid(),
      user_id    UUID        NOT NULL,
      name       VARCHAR(255) NOT NULL,
      position   INTEGER     NOT NULL DEFAULT 0,
      deleted_at TIMESTAMPTZ,
      created_at TIMESTAMPTZ NOT NULL DEFAULT NOW(),
      updated_at TIMESTAMPTZ NOT NULL DEFAULT NOW()
    );
    CREATE INDEX idx_sections_user_id ON sections(user_id);
    CREATE TABLE items (
      id             UUID PRIMARY KEY DEFAULT gen_random_uuid(),
      section_id     UUID         NOT NULL REFERENCES sections(id) ON DELETE CASCADE,
      name_en        VARCHAR(255) NOT NULL,
      name_secondary VARCHAR(255),
      quantity       INTEGER      NOT NULL DEFAULT 1,
      checked        BOOLEAN      NOT NULL DEFAULT FALSE,
      deleted_at     TIMESTAMPTZ,
      created_at     TIMESTAMPTZ  NOT NULL DEFAULT NOW(),
      updated_at     TIMESTAMPTZ  NOT NULL DEFAULT NOW()
    );
    CREATE INDEX idx_items_section_id ON items(section_id);
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-data
  namespace: sga
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: sga
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_USER
              value: sga
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: sga-secret
                  key: postgres-password
            - name: POSTGRES_DB
              value: postgres
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
            - name: init-sql
              mountPath: /docker-entrypoint-initdb.d
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "sga", "-d", "postgres"]
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: postgres-data
          persistentVolumeClaim:
            claimName: postgres-data
        - name: init-sql
          configMap:
            name: postgres-init
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: sga
spec:
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432
