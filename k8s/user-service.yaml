apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service
  namespace: sga
spec:
  replicas: 1
  selector:
    matchLabels:
      app: user-service
  template:
    metadata:
      labels:
        app: user-service
    spec:
      containers:
        - name: user-service
          image: sga/user-service
          imagePullPolicy: Never
          ports:
            - containerPort: 4001
          env:
            - name: USER_DB_URL
              value: postgres://sga:$(POSTGRES_PASSWORD)@postgres:5432/user_db?sslmode=disable
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: sga-secret
                  key: postgres-password
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: sga-secret
                  key: jwt-secret
            - name: USER_SERVICE_PORT
              value: "4001"
          readinessProbe:
            httpGet:
              path: /health
              port: 4001
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: user-service
  namespace: sga
spec:
  selector:
    app: user-service
  ports:
    - port: 4001
      targetPort: 4001
