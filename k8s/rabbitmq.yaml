apiVersion: v1
kind: ConfigMap
metadata:
  name: rabbitmq-definitions
  namespace: sga
data:
  definitions.json: |
    {
      "users": [
        { "name": "sga", "password": "sga_secret", "tags": "administrator" }
      ],
      "permissions": [
        { "user": "sga", "vhost": "/", "configure": ".*", "write": ".*", "read": ".*" }
      ],
      "vhosts": [{ "name": "/" }],
      "queues": [
        { "name": "ai.jobs", "vhost": "/", "durable": true, "auto_delete": false, "arguments": { "x-message-ttl": 300000 } },
        { "name": "ai.results", "vhost": "/", "durable": true, "auto_delete": false, "arguments": { "x-message-ttl": 300000 } },
        { "name": "list.events", "vhost": "/", "durable": true, "auto_delete": false, "arguments": {} }
      ],
      "exchanges": [
        { "name": "ai", "vhost": "/", "type": "direct", "durable": true, "auto_delete": false },
        { "name": "list", "vhost": "/", "type": "fanout", "durable": true, "auto_delete": false }
      ],
      "bindings": [
        { "source": "ai", "vhost": "/", "destination": "ai.jobs", "destination_type": "queue", "routing_key": "jobs" },
        { "source": "ai", "vhost": "/", "destination": "ai.results", "destination_type": "queue", "routing_key": "results" },
        { "source": "list", "vhost": "/", "destination": "list.events", "destination_type": "queue", "routing_key": "" }
      ]
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rabbitmq
  namespace: sga
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rabbitmq
  template:
    metadata:
      labels:
        app: rabbitmq
    spec:
      containers:
        - name: rabbitmq
          image: rabbitmq:3-management-alpine
          ports:
            - containerPort: 5672
            - containerPort: 15672
          env:
            - name: RABBITMQ_DEFAULT_USER
              value: sga
            - name: RABBITMQ_DEFAULT_PASS
              valueFrom:
                secretKeyRef:
                  name: sga-secret
                  key: rabbitmq-password
            - name: RABBITMQ_DEFAULT_VHOST
              value: /
            - name: RABBITMQ_SERVER_ADDITIONAL_ERL_ARGS
              value: "-rabbitmq_management load_definitions \"/etc/rabbitmq/definitions.json\""
          volumeMounts:
            - name: definitions
              mountPath: /etc/rabbitmq/definitions.json
              subPath: definitions.json
              readOnly: true
          readinessProbe:
            exec:
              command: ["rabbitmq-diagnostics", "ping"]
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 10
            failureThreshold: 6
      volumes:
        - name: definitions
          configMap:
            name: rabbitmq-definitions
---
apiVersion: v1
kind: Service
metadata:
  name: rabbitmq
  namespace: sga
spec:
  selector:
    app: rabbitmq
  ports:
    - name: amqp
      port: 5672
      targetPort: 5672
    - name: management
      port: 15672
      targetPort: 15672
