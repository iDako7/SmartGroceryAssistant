name: Ownership Review Check

on:
  pull_request:
    types: [opened, synchronize, reopened]
  pull_request_review:
    types: [submitted]

concurrency:
  group: ownership-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  pull-requests: read
  contents: read

jobs:
  ownership-review:
    name: Ownership Review
    runs-on: ubuntu-latest
    steps:
      - name: Check ownership and reviews
        uses: actions/github-script@v7
        with:
          script: |
            // === OWNERSHIP MAP ===
            // Keep in sync with .github/CODEOWNERS
            const OWNERSHIP = {
              'web/':                   'William-g7',
              'services/api-gateway/':  'William-g7',
              'services/user-service/': 'KaiyueWei',
              'services/list-service/': 'KaiyueWei',
              'services/ai-service/':   'iDako7',
            };

            // === GET PR INFO ===
            const pr = context.payload.pull_request;
            if (!pr) {
              core.setFailed('Could not resolve pull_request from event payload.');
              return;
            }
            const author = pr.user.login;
            console.log(`PR #${pr.number} by @${author}`);

            // === GET CHANGED FILES ===
            const files = [];
            let page = 1;
            while (true) {
              const resp = await github.rest.pulls.listFiles({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: pr.number,
                per_page: 100,
                page,
              });
              files.push(...resp.data.map(f => f.filename));
              if (resp.data.length < 100) break;
              page++;
            }
            console.log(`Changed files (${files.length}):`);

            // === CLASSIFY FILES ===
            function getOwner(filepath) {
              const prefixes = Object.keys(OWNERSHIP).sort((a, b) => b.length - a.length);
              for (const prefix of prefixes) {
                if (filepath.startsWith(prefix)) {
                  return OWNERSHIP[prefix];
                }
              }
              return null; // shared path
            }

            const requiredReviewers = new Set();
            let touchesShared = false;

            for (const file of files) {
              const owner = getOwner(file);
              if (owner === null) {
                touchesShared = true;
                console.log(`  ${file} -> SHARED`);
              } else if (owner !== author) {
                requiredReviewers.add(owner);
                console.log(`  ${file} -> owned by @${owner} (needs review)`);
              } else {
                console.log(`  ${file} -> owned by @${author} (author)`);
              }
            }

            // === PASS: author owns everything, no shared paths ===
            if (requiredReviewers.size === 0 && !touchesShared) {
              console.log('All changed files are owned by the PR author. No review required.');
              return;
            }

            // === GET APPROVED REVIEWS (paginated) ===
            // Reviews are in chronological order; last state per user wins
            const allReviews = [];
            let reviewPage = 1;
            while (true) {
              const resp = await github.rest.pulls.listReviews({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: pr.number,
                per_page: 100,
                page: reviewPage,
              });
              allReviews.push(...resp.data);
              if (resp.data.length < 100) break;
              reviewPage++;
            }

            const reviewState = {};
            for (const review of allReviews) {
              reviewState[review.user.login] = review.state;
            }
            const approvers = new Set(
              Object.entries(reviewState)
                .filter(([, state]) => state === 'APPROVED')
                .map(([user]) => user)
            );
            console.log('Current approvers:', [...approvers]);

            // === EVALUATE ===
            const missing = [];

            for (const reviewer of requiredReviewers) {
              if (!approvers.has(reviewer)) {
                missing.push(`@${reviewer} (owns affected service files)`);
              }
            }

            if (touchesShared) {
              const hasNonAuthorApproval = [...approvers].some(a => a !== author);
              if (!hasNonAuthorApproval) {
                missing.push('at least 1 team member (shared paths changed)');
              }
            }

            if (missing.length > 0) {
              core.setFailed([
                'Review required before merging:',
                '',
                ...missing.map(m => `- ${m}`),
                '',
                "This PR touches files outside the author's ownership or shared paths.",
              ].join('\n'));
            } else {
              console.log('All required reviews are in place.');
            }
