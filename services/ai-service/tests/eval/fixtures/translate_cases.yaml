# Test fixtures for the translate endpoint eval.
# 5 cases covering multiple languages and tricky translation scenarios.
# Each case has: is-json schema check, javascript structure validation, and 2x llm-rubric judges.
# Variables (name_en, target_language, profile_context) map to the prompt template.

# Case 1: Simple common item to Chinese
- description: "milk to Chinese — simple unambiguous translation"
  vars:
    name_en: "milk"
    target_language: "Chinese"
    profile_context: ""
  assert:
    - type: is-json
      value:
        type: object
        required: ["name_translated", "notes"]
        properties:
          name_translated: { type: string }
          notes: { type: string }
    - type: javascript
      value: |
        const d = JSON.parse(output);
        return { pass: d.name_translated && d.name_translated.length > 0, score: d.name_translated && d.name_translated.length > 0 ? 1 : 0, reason: d.name_translated ? 'Has translation' : 'Missing translation' };
    - type: llm-rubric
      value: |
        Translation is accurate for grocery/cooking context. '牛奶' is the standard Chinese translation for milk. Notes field provides useful context when relevant, empty notes acceptable for unambiguous items.
      provider:
        id: openrouter:anthropic/claude-sonnet-4.6
        config:
          temperature: 0
    - type: llm-rubric
      value: |
        Translation is accurate for grocery/cooking context. '牛奶' is the standard Chinese translation for milk. Notes field provides useful context when relevant, empty notes acceptable for unambiguous items.
      provider:
        id: openrouter:openai/gpt-5.4-mini
        config:
          temperature: 0

