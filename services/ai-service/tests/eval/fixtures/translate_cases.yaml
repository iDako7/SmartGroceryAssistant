# Case 4: Easily confused item to French
- description: "baking soda to French — must not confuse with baking powder"
  vars:
    name_en: "baking soda"
    target_language: "French"
    profile_context: ""
  assert:
    - type: is-json
      value:
        type: object
        required: ["name_translated", "notes"]
        properties:
          name_translated: { type: string }
          notes: { type: string }
    - type: javascript
      value: |
        const d = JSON.parse(output);
        return { pass: d.name_translated && d.name_translated.length > 0, score: d.name_translated && d.name_translated.length > 0 ? 1 : 0, reason: d.name_translated ? 'Has translation' : 'Missing translation' };
    - type: llm-rubric
      value: |
        Translation is accurate. 'Bicarbonate de soude' is the standard French translation. Must NOT be confused with baking powder (levure chimique). Notes should clarify the distinction if provided.
