# Case 5: Transliteration roundtrip
- description: "bok choy to Chinese — already a romanization of Chinese"
  vars:
    name_en: "bok choy"
    target_language: "Chinese"
    profile_context: ""
  assert:
    - type: is-json
      value:
        type: object
        required: ["name_translated", "notes"]
        properties:
          name_translated: { type: string }
          notes: { type: string }
    - type: javascript
      value: |
        const d = JSON.parse(output);
        return { pass: d.name_translated && d.name_translated.length > 0, score: d.name_translated && d.name_translated.length > 0 ? 1 : 0, reason: d.name_translated ? 'Has translation' : 'Missing translation' };
    - type: llm-rubric
      value: |
        Translation handles the transliteration case correctly. Bok choy is already a romanization of Chinese (白菜 or 小白菜). The model should return the Chinese characters, not just echo back 'bok choy'. Notes may mention that this is a Cantonese romanization.
      provider:
        id: openrouter:anthropic/claude-sonnet-4.6
        config:
          temperature: 0
    - type: llm-rubric
      value: |
        Translation handles the transliteration case correctly. Bok choy is already a romanization of Chinese (白菜 or 小白菜). The model should return the Chinese characters, not just echo back 'bok choy'. Notes may mention that this is a Cantonese romanization.
