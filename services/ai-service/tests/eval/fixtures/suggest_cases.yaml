# Test fixtures for the suggest endpoint eval.
# 8 cases: 4 core behavior, 2 edge cases, 2 profile variants.
# Each case has: is-json schema check, javascript structural validation, and 2x llm-rubric judges.
# Variables (sections_text, answers_text, profile_context) map to the prompt template.
# Transform strips markdown fences since suggest output is large and models often wrap it.

# ── Shared JSON Schema for SuggestResponse ──────────────────
# Used by is-json in every case. Validates the full nested structure.

# Case 1: Clear Asian weeknight dinner
- description: "Asian dinner — chicken/rice/soy sauce with clarify answers"
  vars:
    sections_text: "Produce: garlic, ginger, bok choy. Meat: chicken thighs. Pantry: rice, soy sauce"
    answers_text: "User context (from their answers):\nQ: What's the occasion?\nA: Weeknight dinner\nQ: How many people?\nA: Family of 4\nQ: Any cuisine preference?\nA: Asian"
    profile_context: ""
  options:
    transform: "output.replace(/```json\\n?|```/g, '').trim()"
  assert:
    - type: is-json
      value:
        type: object
        required: ["reason", "clusters", "ungrouped", "storeLayout"]
        properties:
          reason: { type: string }
          clusters:
            type: array
            minItems: 2
            maxItems: 4
            items:
              type: object
              required: ["name", "emoji", "desc", "items"]
              properties:
                name: { type: string }
                emoji: { type: string }
                desc: { type: string }
                items:
                  type: array
                  minItems: 1
                  items:
                    type: object
                    required: ["name_en", "existing"]
                    properties:
                      name_en: { type: string }
                      existing: { type: boolean }
          ungrouped:
            type: array
            items:
              type: object
              required: ["name_en", "existing"]
          storeLayout:
            type: array
            minItems: 1
            items:
              type: object
              required: ["category", "emoji", "items"]
              properties:
                category: { type: string }
                emoji: { type: string }
                items:
                  type: array
                  minItems: 1
                  items:
                    type: object
                    required: ["name_en", "existing"]
    - type: javascript
      value: |
        const d = JSON.parse(output.replace(/```json\n?|```/g, '').trim());
        const existingItems = ['garlic', 'ginger', 'bok choy', 'chicken thighs', 'rice', 'soy sauce'];
        const allClusterItems = d.clusters.flatMap(c => c.items);
        const allUngrouped = d.ungrouped || [];
        const newItems = allClusterItems.filter(i => !i.existing);
        const existingInClusters = allClusterItems.filter(i => i.existing).map(i => i.name_en.toLowerCase());
        const existingInUngrouped = allUngrouped.filter(i => i.existing).map(i => i.name_en.toLowerCase());
        const allAccountedExisting = [...existingInClusters, ...existingInUngrouped];
        const layoutItems = d.storeLayout.flatMap(c => c.items).map(i => i.name_en.toLowerCase());
        const allItemNames = [...allClusterItems, ...allUngrouped].map(i => i.name_en.toLowerCase());
        const errors = [];
        if (d.clusters.length < 2 || d.clusters.length > 4) errors.push(`cluster count ${d.clusters.length} not in 2-4`);
        if (newItems.length < 3 || newItems.length > 6) errors.push(`new item count ${newItems.length} not in 3-6`);
        for (const ei of existingItems) {
          const matches = allAccountedExisting.filter(n => n.includes(ei) || ei.includes(n));
          if (matches.length === 0) errors.push(`existing item "${ei}" not found in clusters or ungrouped`);
        }
        if (layoutItems.length < allItemNames.length) errors.push(`storeLayout has ${layoutItems.length} items but total is ${allItemNames.length}`);
        const pass = errors.length === 0;
        return { pass, score: pass ? 1 : 0, reason: pass ? 'All structural checks passed' : errors.join('; ') };
    - type: llm-rubric
      value: |
        This is an Asian weeknight dinner for a family of 4. The grocery list has: garlic, ginger, bok choy, chicken thighs, rice, soy sauce.
        Evaluate: (1) Are the meal clusters coherent Asian dishes? (2) Do new item suggestions make sense for Asian cooking (e.g. sesame oil, oyster sauce, scallions)? (3) Does the reason accurately summarize the analysis? (4) Is the store layout organized by real grocery store sections?
      provider:
        id: 'openrouter:{{ env.JUDGE_MODEL_A }}'
        config:
          temperature: 0
    - type: llm-rubric
      value: |
        This is an Asian weeknight dinner for a family of 4. The grocery list has: garlic, ginger, bok choy, chicken thighs, rice, soy sauce.
        Evaluate: (1) Are the meal clusters coherent Asian dishes? (2) Do new item suggestions make sense for Asian cooking (e.g. sesame oil, oyster sauce, scallions)? (3) Does the reason accurately summarize the analysis? (4) Is the store layout organized by real grocery store sections?
      provider:
        id: 'openrouter:{{ env.JUDGE_MODEL_B }}'
        config:
          temperature: 0

