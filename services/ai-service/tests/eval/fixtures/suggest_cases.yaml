# Case 8: Profile variant — single person on the large meal-prep list
- description: "single household — large meal-prep list scaled for 1 person"
  vars:
    sections_text: "Produce: broccoli, spinach, bell peppers, onions, sweet potatoes. Meat: chicken breast, ground turkey, salmon. Dairy: greek yogurt, eggs, cheddar cheese. Pantry: brown rice, quinoa, olive oil, canned black beans, oats"
    answers_text: "User context (from their answers):\nQ: What's the plan for these groceries?\nA: Meal prep for the week\nQ: How many people?\nA: 2 adults"
    profile_context: "\nUser profile (MUST respect): Household: 1 person."
  options:
    transform: "output.replace(/```json\\n?|```/g, '').trim()"
  assert:
    - type: is-json
      value:
        type: object
        required: ["reason", "clusters", "ungrouped", "storeLayout"]
        properties:
          reason: { type: string }
          clusters:
            type: array
            minItems: 2
            maxItems: 4
          ungrouped: { type: array }
          storeLayout: { type: array, minItems: 1 }
    - type: javascript
      value: |
        const d = JSON.parse(output.replace(/```json\n?|```/g, '').trim());
        const existingItems = ['broccoli', 'spinach', 'bell peppers', 'onions', 'sweet potatoes', 'chicken breast', 'ground turkey', 'salmon', 'greek yogurt', 'eggs', 'cheddar cheese', 'brown rice', 'quinoa', 'olive oil', 'canned black beans', 'oats'];
        const allClusterItems = d.clusters.flatMap(c => c.items);
        const allUngrouped = d.ungrouped || [];
        const newItems = allClusterItems.filter(i => !i.existing);
        const existingInClusters = allClusterItems.filter(i => i.existing).map(i => i.name_en.toLowerCase());
        const existingInUngrouped = allUngrouped.filter(i => i.existing).map(i => i.name_en.toLowerCase());
        const allAccountedExisting = [...existingInClusters, ...existingInUngrouped];
        const layoutItems = d.storeLayout.flatMap(c => c.items).map(i => i.name_en.toLowerCase());
        const allItemNames = [...allClusterItems, ...allUngrouped].map(i => i.name_en.toLowerCase());
        const errors = [];
        if (d.clusters.length < 2 || d.clusters.length > 4) errors.push(`cluster count ${d.clusters.length} not in 2-4`);
        if (newItems.length < 3 || newItems.length > 6) errors.push(`new item count ${newItems.length} not in 3-6`);
        for (const ei of existingItems) {
          const matches = allAccountedExisting.filter(n => n.includes(ei) || ei.includes(n));
          if (matches.length === 0) errors.push(`existing item "${ei}" not found in clusters or ungrouped`);
        }
        if (layoutItems.length < allItemNames.length) errors.push(`storeLayout has ${layoutItems.length} items but total is ${allItemNames.length}`);
        const pass = errors.length === 0;
        return { pass, score: pass ? 1 : 0, reason: pass ? 'All structural checks passed' : errors.join('; ') };
    - type: llm-rubric
      value: |
        Same large meal-prep list as Case 4, but profile says household size is 1 person (answers say 2 adults — conflict).
        Evaluate: (1) Does the model acknowledge the single-person household? (2) Are portions/clusters scaled appropriately — fewer clusters or smaller scope than a 2-person plan? (3) Does it handle the conflict between "2 adults" answer and "1 person" profile gracefully? (4) New items should be practical for single-person meal prep (storage containers are NOT groceries).
      provider:
        id: 'openrouter:{{ env.JUDGE_MODEL_A }}'
        config:
          temperature: 0
    - type: llm-rubric
      value: |
        Same large meal-prep list as Case 4, but profile says household size is 1 person (answers say 2 adults — conflict).
        Evaluate: (1) Does the model acknowledge the single-person household? (2) Are portions/clusters scaled appropriately — fewer clusters or smaller scope than a 2-person plan? (3) Does it handle the conflict between "2 adults" answer and "1 person" profile gracefully? (4) New items should be practical for single-person meal prep (storage containers are NOT groceries).
      provider:
        id: 'openrouter:{{ env.JUDGE_MODEL_B }}'
        config:
          temperature: 0
