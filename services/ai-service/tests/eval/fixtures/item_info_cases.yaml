# Test fixtures for the item-info endpoint eval.
# 5 cases covering common produce, specialty items, and spices.
# Each case has: is-json schema check, javascript structure validation, and 2x llm-rubric judges.
# Variables (name_en, profile_context) map to the prompt template.

# Case 1: Common fruit
- description: "banana — common fruit with well-known properties"
  vars:
    name_en: "banana"
    profile_context: ""
  assert:
    - type: is-json
      value:
        type: object
        required: ["category", "typical_unit", "storage_tip", "nutrition_note"]
        properties:
          category: { type: string }
          typical_unit: { type: string }
          storage_tip: { type: string }
          nutrition_note: { type: string }
    - type: javascript
      value: |
        const d = JSON.parse(output);
        const valid = d.category && d.typical_unit && d.storage_tip && d.nutrition_note && d.category.length > 0 && d.typical_unit.length > 0 && d.storage_tip.length > 0 && d.nutrition_note.length > 0;
        return { pass: valid, score: valid ? 1 : 0, reason: valid ? 'All fields present' : 'Missing fields' };
    - type: llm-rubric
      value: |
        All four fields are factually accurate for banana. Category should be produce/fruit. Storage tip should be actionable (e.g., room temperature to ripen, fridge to slow). Nutrition note should highlight a specific characteristic (e.g., potassium, natural energy), not a generic statement.
      provider:
        id: openrouter:anthropic/claude-sonnet-4.6
        config:
          temperature: 0
    - type: llm-rubric
      value: |
        All four fields are factually accurate for banana. Category should be produce/fruit. Storage tip should be actionable (e.g., room temperature to ripen, fridge to slow). Nutrition note should highlight a specific characteristic (e.g., potassium, natural energy), not a generic statement.
      provider:
        id: openrouter:openai/gpt-5.4-mini
        config:
          temperature: 0

