# Test fixtures for the alternatives endpoint eval.
# 5 cases covering dietary constraints, cuisine preferences, and general substitution.
# Each case has: is-json schema check, javascript structure validation, and 2x llm-rubric judges.
# Variables (name_en, reason, taste, profile_context) map to the prompt template.

# Case 1: General alternative (no constraints)
- description: "sriracha — general alternative with no constraints"
  vars:
    name_en: "sriracha"
    reason: ""
    taste: ""
    profile_context: ""
  assert:
    - type: is-json
      value:
        type: object
        required: ["note", "alts"]
        properties:
          note: { type: string }
          alts:
            type: array
            minItems: 3
            maxItems: 4
            items:
              type: object
              required: ["name_en", "match", "desc", "where"]
              properties:
                name_en: { type: string }
                match: { type: string }
                desc: { type: string }
                where: { type: string }
    - type: javascript
      value: |
        const d = JSON.parse(output);
        const matchValues = ['Very close', 'Similar', 'Different but works'];
        const valid = d.note && d.alts && d.alts.length >= 3 && d.alts.length <= 4 && d.alts.every(a => a.name_en && a.match && matchValues.includes(a.match) && a.desc && a.where);
        return { pass: valid, score: valid ? 1 : 0, reason: valid ? 'Structure valid' : 'Invalid structure or match values' };
    - type: llm-rubric
      value: |
        Alternatives are genuinely available in North American grocery stores. Match levels are honest — 'Very close' should be another hot sauce, not a completely different condiment. Each alternative should be a real product. 'where' gives useful store location.
      provider:
        id: openrouter:anthropic/claude-sonnet-4.6
        config:
          temperature: 0
    - type: llm-rubric
      value: |
        Alternatives are genuinely available in North American grocery stores. Match levels are honest — 'Very close' should be another hot sauce, not a completely different condiment. Each alternative should be a real product. 'where' gives useful store location.
      provider:
        id: openrouter:openai/gpt-5.4-mini
        config:
          temperature: 0

