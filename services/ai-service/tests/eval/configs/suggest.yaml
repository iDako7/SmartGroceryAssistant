# yaml-language-server: $schema=https://promptfoo.dev/config-schema.json
# Suggest eval config — 5-model comparison across cheap and mid tiers.
# Tests meal suggestion generation for grocery lists with clarify answers.
# Run: npx promptfoo@latest eval -c configs/suggest.yaml --env-file ../../.env --no-cache

description: "Suggest — 5-model tier comparison (current prompt)"

prompts:
  - file://../prompts/current/suggest.json

providers:
  # Cheap tier
  - id: openrouter:openai/gpt-5.4-nano
    label: "GPT-5.4 Nano (cheap)"
    config:
      temperature: 0.7
      max_tokens: 2000
  - id: openrouter:google/gemini-2.5-flash
    label: "Gemini 2.5 Flash (cheap)"
    config:
      temperature: 0.7
      max_tokens: 2000
  # Mid tier
  - id: openrouter:openai/gpt-5.4-mini
    label: "GPT-5.4 Mini (mid)"
    config:
      temperature: 0.7
      max_tokens: 2000
  - id: openrouter:anthropic/claude-sonnet-4.5
    label: "Claude Sonnet 4.5 (mid)"
    config:
      temperature: 0.7
      max_tokens: 2000
  - id: openrouter:google/gemini-2.5-pro
    label: "Gemini 2.5 Pro (mid)"
    config:
      temperature: 0.7
      max_tokens: 2000

tests: file://../fixtures/suggest_cases.yaml
