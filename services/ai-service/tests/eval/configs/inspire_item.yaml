# yaml-language-server: $schema=https://promptfoo.dev/config-schema.json
# Inspire/item eval config — Scenario 1: OpenAI tier comparison (current prompt).
# Compares GPT-5.4 Nano vs Mini (same prompt) to measure quality-to-cost tradeoff.
# Run: npx promptfoo@latest eval -c configs/inspire_item.yaml --env-file ../../.env --no-cache

description: "Inspire Item — Scenario 1: OpenAI tier comparison (current prompt)"

prompts:
  - file://../prompts/current/inspire_item.json

providers:
  - id: openrouter:openai/gpt-5.4-nano
    label: "GPT-5.4 Nano ($0.20/M)"
    config:
      temperature: 0.7
      max_tokens: 800
  - id: openrouter:openai/gpt-5.4-mini
    label: "GPT-5.4 Mini ($0.75/M)"
    config:
      temperature: 0.7
      max_tokens: 800

tests: file://../fixtures/inspire_item_cases.yaml
