# yaml-language-server: $schema=https://promptfoo.dev/config-schema.json
# Alternatives eval config — Scenario 2: Cross-provider mid tier.
# Compares GPT-5.4 Mini vs Gemini 2.5 Pro vs Claude Sonnet 4.6 (same prompt).
# Run: npx promptfoo@latest eval -c configs/scenario2_alternatives_mid.yaml --env-file ../../.env --no-cache

description: "Alternatives — Scenario 2: Cross-provider mid tier"

prompts:
  - file://../prompts/current/alternatives.json

providers:
  - id: openrouter:openai/gpt-5.4-mini
    label: "GPT-5.4 Mini ($0.75/M)"
    config:
      temperature: 0.7
      max_tokens: 800
  - id: openrouter:google/gemini-2.5-pro
    label: "Gemini 2.5 Pro ($1.25/M)"
    config:
      temperature: 0.7
      max_tokens: 4096
  - id: openrouter:anthropic/claude-sonnet-4.6
    label: "Claude Sonnet 4.6 ($3.00/M)"
    config:
      temperature: 0.7
      max_tokens: 800

defaultTest:
  options:
    transform: "output.replace(/```json\\n?|```/g, '').replace(/^[\\s\\S]*?(?=\\{)/m, '').trim()"

tests: file://../fixtures/alternatives_cases.yaml
