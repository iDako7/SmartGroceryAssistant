# yaml-language-server: $schema=https://promptfoo.dev/config-schema.json
# Alternatives eval config — Scenario 2: Cross-provider cheap tier.
# Compares GPT-5.4 Nano vs Gemini 2.5 Flash vs Claude Haiku 4.5 (same prompt).
# Run: npx promptfoo@latest eval -c configs/scenario2_alternatives_cheap.yaml --env-file ../../.env --no-cache

description: "Alternatives — Scenario 2: Cross-provider cheap tier"

prompts:
  - file://../prompts/current/alternatives.json

providers:
  - id: openrouter:openai/gpt-5.4-nano
    label: "GPT-5.4 Nano ($0.20/M)"
    config:
      temperature: 0.7
      max_tokens: 800
  - id: openrouter:google/gemini-2.5-flash
    label: "Gemini 2.5 Flash ($0.30/M)"
    config:
      temperature: 0.7
      max_tokens: 800
  - id: openrouter:anthropic/claude-haiku-4.5
    label: "Claude Haiku 4.5 ($1.00/M)"
    config:
      temperature: 0.7
      max_tokens: 800

defaultTest:
  options:
    transform: "output.replace(/```json\\n?|```/g, '').replace(/^[\\s\\S]*?(?=\\{)/m, '').trim()"

tests: file://../fixtures/alternatives_cases.yaml
