            Produce: broccoli, spinach, bell peppers, onions, sweet potatoes.
            Meat: chicken breast, ground turkey, salmon. Dairy: greek yogurt,
            eggs, cheddar cheese. Pantry: brown rice, quinoa, olive oil, canned
