              const existingInUngrouped = allUngrouped.filter(i =>
              i.existing).map(i => i.name_en.toLowerCase());

              const allAccountedExisting = [...existingInClusters,
              ...existingInUngrouped];

              const layoutItems = d.storeLayout.flatMap(c => c.items).map(i =>
              i.name_en.toLowerCase());

              const allItemNames = [...allClusterItems, ...allUngrouped].map(i
              => i.name_en.toLowerCase());

              const errors = [];

              if (d.clusters.length < 2 || d.clusters.length > 4)
