            const allUngrouped = d.ungrouped || [];

            const newItems = allClusterItems.filter(i => !i.existing);

            const existingInClusters = allClusterItems.filter(i =>
            i.existing).map(i => i.name_en.toLowerCase());

            const existingInUngrouped = allUngrouped.filter(i =>
