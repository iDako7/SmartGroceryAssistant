              'olive oil'];

              const allClusterItems = d.clusters.flatMap(c => c.items);

              const allUngrouped = d.ungrouped || [];

              const newItems = allClusterItems.filter(i => !i.existing);

              const existingInClusters = allClusterItems.filter(i =>
              i.existing).map(i => i.name_en.toLowerCase());

              const existingInUngrouped = allUngrouped.filter(i =>
              i.existing).map(i => i.name_en.toLowerCase());

              const allAccountedExisting = [...existingInClusters,
              ...existingInUngrouped];

              const layoutItems = d.storeLayout.flatMap(c => c.items).map(i =>
              i.name_en.toLowerCase());

              const allItemNames = [...allClusterItems, ...allUngrouped].map(i
              => i.name_en.toLowerCase());

              const errors = [];

              if (d.clusters.length < 2 || d.clusters.length > 4)
              errors.push(`cluster count ${d.clusters.length} not in 2-4`);

              if (newItems.length < 3 || newItems.length > 6) errors.push(`new
              item count ${newItems.length} not in 3-6`);

