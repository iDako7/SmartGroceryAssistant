          - type: javascript
            value: >
              const d = JSON.parse(output.replace(/```json\n?|```/g,
              '').trim());

              const existingItems = ['broccoli', 'spinach', 'bell peppers',
              'onions', 'sweet potatoes', 'chicken breast', 'ground turkey',
              'salmon', 'greek yogurt', 'eggs', 'cheddar cheese', 'brown rice',
              'quinoa', 'olive oil', 'canned black beans', 'oats'];

              const allClusterItems = d.clusters.flatMap(c => c.items);

              const allUngrouped = d.ungrouped || [];

              const newItems = allClusterItems.filter(i => !i.existing);

              const existingInClusters = allClusterItems.filter(i =>
              i.existing).map(i => i.name_en.toLowerCase());

              const existingInUngrouped = allUngrouped.filter(i =>
              i.existing).map(i => i.name_en.toLowerCase());

              const allAccountedExisting = [...existingInClusters,
              ...existingInUngrouped];

              const layoutItems = d.storeLayout.flatMap(c => c.items).map(i =>
              i.name_en.toLowerCase());

              const allItemNames = [...allClusterItems, ...allUngrouped].map(i
              => i.name_en.toLowerCase());

              const errors = [];

              if (d.clusters.length < 2 || d.clusters.length > 4)
              errors.push(`cluster count ${d.clusters.length} not in 2-4`);

              if (newItems.length < 3 || newItems.length > 6) errors.push(`new
              item count ${newItems.length} not in 3-6`);

              for (const ei of existingItems) {
                const matches = allAccountedExisting.filter(n => n.includes(ei) || ei.includes(n));
                if (matches.length === 0) errors.push(`existing item "${ei}" not found in clusters or ungrouped`);
              }

              if (layoutItems.length < allItemNames.length)
              errors.push(`storeLayout has ${layoutItems.length} items but total
              is ${allItemNames.length}`);

              const pass = errors.length === 0;

              return { pass, score: pass ? 1 : 0, reason: pass ? 'All structural
              checks passed' : errors.join('; ') };
